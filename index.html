    </div>
  </div>`;
  document.getElementById('modalPanel').innerHTML=h;document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('docUrl')?.focus(),100);
}

function autoDetectDocType(){
  const url=(document.getElementById('docUrl')?.value||'').trim();
  const el=document.getElementById('docTypeDetected');
  if(!url){el.innerHTML='';return;}
  const type=detectDocType(url);
  const dt=DOC_TYPES[type];
  el.innerHTML=`<span style="display:inline-flex;align-items:center;gap:4px;">${dt.icon} Detected: <strong>${dt.label}</strong></span>`;
  // Auto-fill name from Google URLs
  const nameInput=document.getElementById('docName');
  if(!nameInput.value){
    const titleMatch=url.match(/\/d\/[^/]+\/.*[?&]title=([^&]+)/);
    if(titleMatch)nameInput.value=decodeURIComponent(titleMatch[1]);
  }
}

function saveDocument(){
  const proj=getProject();if(!proj)return;
  const url=(document.getElementById('docUrl')?.value||'').trim();
  const name=(document.getElementById('docName')?.value||'').trim();
  if(!url){toast('URL is required');return;}
  if(!name){toast('Name is required');return;}
  if(!proj.documents)proj.documents=[];
  const type=detectDocType(url);
  const doc={
    id:uid(),url,name,type,
    description:(document.getElementById('docDesc')?.value||'').trim(),
    category:document.getElementById('docCategory')?.value||'📎 Other',
    milestoneId:document.getElementById('docMilestone')?.value||'',
    addedBy:(document.getElementById('docAddedBy')?.value||'').trim()||'You',
    addedAt:Date.now()
  };
  proj.documents.push(doc);
  if(!proj.activity)proj.activity=[];
  proj.activity.push({id:uid(),author:doc.addedBy,text:`added document <strong>${name}</strong> (${DOC_TYPES[type]?.label||'Link'})`,ts:Date.now(),field:'document'});
  save();closeModal();render();toast('Document added','success');
}

function editDocument(docId){
  const proj=getProject();if(!proj||!proj.documents)return;
  const d=proj.documents.find(x=>x.id===docId);if(!d)return;
  const milestones=proj.milestones||[];
  let h=`<div class="modal-header"><h2>✏️ Edit Document</h2><button class="modal-close" onclick="closeModal()">✕</button></div>`;
  h+=`<div class="modal-body">
    <div class="field"><label>URL</label><input id="docUrl" value="${d.url.replace(/"/g,'&quot;')}" oninput="autoDetectDocType()"></div>
    <div id="docTypeDetected" style="margin-bottom:8px;font-size:12px;color:var(--text-secondary);"></div>
    <div class="field"><label>Name</label><input id="docName" value="${d.name.replace(/"/g,'&quot;')}"></div>
    <div class="field"><label>Description</label><input id="docDesc" value="${(d.description||'').replace(/"/g,'&quot;')}"></div>
    <div class="field-row">
      <div class="field"><label>Category</label>
        <select id="docCategory">${DOC_CATEGORIES.map(c=>`<option value="${c}" ${d.category===c?'selected':''}>${c}</option>`).join('')}</select>
      </div>
      <div class="field"><label>Link to Milestone</label>
        <select id="docMilestone">
          <option value="">— None —</option>
          ${milestones.map(m=>`<option value="${m.id}" ${d.milestoneId===m.id?'selected':''}>${m.title}</option>`).join('')}
        </select>
      </div>
    </div>
    <div style="margin-top:20px;display:flex;gap:8px;">
      <button class="btn btn-primary btn-lg" style="flex:1;" onclick="updateDocument('${docId}')">💾 Save Changes</button>
      <button class="btn btn-secondary btn-lg" onclick="closeModal()">Cancel</button>
    </div>
  </div>`;
  document.getElementById('modalPanel').innerHTML=h;document.getElementById('modalOverlay').classList.add('open');
  autoDetectDocType();
}

function updateDocument(docId){
  const proj=getProject();if(!proj||!proj.documents)return;
  const d=proj.documents.find(x=>x.id===docId);if(!d)return;
  const url=(document.getElementById('docUrl')?.value||'').trim();
  const name=(document.getElementById('docName')?.value||'').trim();
  if(!url||!name){toast('URL and name are required');return;}
  d.url=url;d.name=name;d.type=detectDocType(url);
  d.description=(document.getElementById('docDesc')?.value||'').trim();
  d.category=document.getElementById('docCategory')?.value||'📎 Other';
  d.milestoneId=document.getElementById('docMilestone')?.value||'';
  if(!proj.activity)proj.activity=[];
  proj.activity.push({id:uid(),author:'You',text:`updated document <strong>${name}</strong>`,ts:Date.now(),field:'document'});
  save();closeModal();render();toast('Document updated','success');
}

function deleteDocument(docId){
  const proj=getProject();if(!proj||!proj.documents)return;
  const d=proj.documents.find(x=>x.id===docId);if(!d)return;
  showConfirm('Remove Document',`Remove <strong>"${d.name}"</strong> from this project?`,'Remove',()=>{
    proj.documents=proj.documents.filter(x=>x.id!==docId);
    if(!proj.activity)proj.activity=[];
    proj.activity.push({id:uid(),author:'You',text:`removed document <strong>${d.name}</strong>`,ts:Date.now(),field:'document'});
    save();render();toast('Document removed');
  },true);
}

function updateMs(id,field,value){
  const proj=getProject();if(!proj)return;const m=proj.milestones.find(x=>x.id===id);if(!m)return;
  const oldVal=m[field];m[field]=value;
  if(!proj.activity)proj.activity=[];
  const fieldLabels={title:'title',phase:'phase',owner:'owner',startDate:'start date',dueDate:'due date',description:'description',progress:'progress',priority:'priority'};
  const label=fieldLabels[field]||field;
  const fmtVal=(f,v)=>{if(!v&&v!==0)return'<em>blank</em>';if(f==='progress')return v+'%';return v;};
  if(oldVal!==value){
    let text;
    if(field==='owner'){
      const from=oldVal||'<em>unassigned</em>',to=value||'<em>unassigned</em>';
      text=`${from!=='<em>unassigned</em>'?'re':''}assigned <strong>${m.title}</strong> to ${to}`;
      if(from!=='<em>unassigned</em>')text+=` (was ${from})`;
    } else {
      text=`updated ${label} on <strong>${m.title}</strong>: ${fmtVal(field,oldVal)} → ${fmtVal(field,value)}`;
    }
    proj.activity.push({id:uid(),author:'You',text,ts:Date.now(),field,milestoneId:id,oldVal,newVal:value});
  }
  save();
}

// ===== QUICK REBASE =====
function quickRebase(targetYear){
  const proj=getProject();if(!proj)return;
  const allDates=proj.milestones.flatMap(m=>[m.startDate,m.dueDate]).filter(Boolean).map(d=>safeDate(d)).filter(d=>d);
  if(!allDates.length){toast('No dates to rebase');return;}
  const sourceYear=Math.min(...allDates.map(d=>d.getFullYear()));
  const yearDiff=targetYear-sourceYear;
  if(yearDiff===0){toast('Already in '+targetYear);return;}
  proj.milestones.forEach(m=>{
    if(m.startDate){const d=safeDate(m.startDate);if(d){d.setFullYear(d.getFullYear()+yearDiff);m.startDate=d.toISOString().split('T')[0];}}
    if(m.dueDate){const d=safeDate(m.dueDate);if(d){d.setFullYear(d.getFullYear()+yearDiff);m.dueDate=d.toISOString().split('T')[0];}}
  });
  if(proj.targetDate){const d=safeDate(proj.targetDate);if(d){d.setFullYear(d.getFullYear()+yearDiff);proj.targetDate=d.toISOString().split('T')[0];}}
  if(!proj.activity)proj.activity=[];
  proj.activity.push({id:uid(),author:'You',text:`quick-rebased all dates from ${sourceYear} to <strong>${targetYear}</strong>`,ts:Date.now(),field:'dates'});
  save();render();toast(`All dates rebased to ${targetYear}`,'success');
}

function getQuickActions(proj){
  const actions=[];
  const ms=proj.milestones||[];
  const allDates=ms.flatMap(m=>[m.startDate,m.dueDate]).filter(Boolean).map(d=>safeDate(d)).filter(d=>d);
  const currentYear=new Date().getFullYear();
  const oldDates=allDates.filter(d=>d.getFullYear()<currentYear);
  const unassigned=ms.filter(m=>!m.owner).length;
  const notStarted=ms.filter(m=>m.status==='Not Started').length;
  const blocked=ms.filter(m=>m.status==='Blocked').length;

  if(oldDates.length)actions.push({icon:'🔄',label:`Rebase to ${currentYear}`,cmd:`Rebase all dates to ${currentYear}`});
  actions.push({icon:'⏩',label:'Shift dates +2 weeks',cmd:'Shift all dates forward 2 weeks'});
  actions.push({icon:'⏩',label:'Shift dates +30 days',cmd:'Shift all dates forward 30 days'});
  if(unassigned)actions.push({icon:'👤',label:`Assign ${unassigned} unassigned`,cmd:'Assign all unassigned milestones to '});
  if(notStarted>3)actions.push({icon:'▶️',label:'Start all Not Started',cmd:'Mark all Not Started milestones as In Progress'});
  if(blocked)actions.push({icon:'✅',label:`Unblock ${blocked} items`,cmd:'Change all Blocked milestones to In Progress'});
  actions.push({icon:'➕',label:'Add testing milestones',cmd:'Add 3 testing milestones'});
  actions.push({icon:'➕',label:'Add launch milestones',cmd:'Add launch preparation milestones'});
  actions.push({icon:'📅',label:'Start from today',cmd:'Rebase plan to start from today'});
  return actions;
}

function executeAICommand(){
  const proj=getProject();if(!proj)return;
  const cmd=(document.getElementById('aiCommand')?.value||'').trim();
  if(!cmd){toast('Type a command');return;}
  const resultEl=document.getElementById('aiCommandResult');
  if(!proj.activity)proj.activity=[];
  const c=cmd.toLowerCase();
  let result=null;

  try{
    // === DATE REBASING ===
    const rebaseYear=c.match(/rebase.*(?:to|year)\s*(\d{4})/);
    if(rebaseYear){
      const targetYear=parseInt(rebaseYear[1]);
      const allDates=proj.milestones.flatMap(m=>[m.startDate,m.dueDate]).filter(Boolean).map(d=>safeDate(d)).filter(d=>d);
      if(!allDates.length){result={ok:false,msg:'No dates found to rebase.'};} else {
        const sourceYear=Math.min(...allDates.map(d=>d.getFullYear()));
        const yearDiff=targetYear-sourceYear;
        if(yearDiff===0){result={ok:true,msg:`Dates are already in ${targetYear}.`,count:0};}
        else{
          let count=0;
          proj.milestones.forEach(m=>{
            if(m.startDate){const d=safeDate(m.startDate);if(d){d.setFullYear(d.getFullYear()+yearDiff);m.startDate=d.toISOString().split('T')[0];count++;}}
            if(m.dueDate){const d=safeDate(m.dueDate);if(d){d.setFullYear(d.getFullYear()+yearDiff);m.dueDate=d.toISOString().split('T')[0];count++;}}
          });
          if(proj.targetDate){const d=safeDate(proj.targetDate);if(d){d.setFullYear(d.getFullYear()+yearDiff);proj.targetDate=d.toISOString().split('T')[0];}}
          proj.activity.push({id:uid(),author:'AI Assistant',text:`rebased all dates from ${sourceYear} to <strong>${targetYear}</strong> (${count} dates updated)`,ts:Date.now(),field:'dates'});
          result={ok:true,msg:`✅ Rebased ${count} dates from ${sourceYear} → ${targetYear}`,count};
        }
      }
    }

    // === DATE SHIFTING ===
    if(!result){
      const shiftMatch=c.match(/shift.*?(forward|backward|back|ahead)?\s*(\d+)\s*(day|week|month)/);
      if(shiftMatch){
        const dir=(!shiftMatch[1]||shiftMatch[1]==='forward'||shiftMatch[1]==='ahead')?1:-1;
        let days=parseInt(shiftMatch[2]);
        if(shiftMatch[3]==='week')days*=7;if(shiftMatch[3]==='month')days*=30;
        const shiftMs=dir*days*86400000;
        let count=0;
        proj.milestones.forEach(m=>{
          if(m.startDate){const d=safeDate(m.startDate);if(d){m.startDate=new Date(d.getTime()+shiftMs).toISOString().split('T')[0];count++;}}
          if(m.dueDate){const d=safeDate(m.dueDate);if(d){m.dueDate=new Date(d.getTime()+shiftMs).toISOString().split('T')[0];count++;}}
        });
        if(proj.targetDate){const d=safeDate(proj.targetDate);if(d){proj.targetDate=new Date(d.getTime()+shiftMs).toISOString().split('T')[0];}}
        proj.activity.push({id:uid(),author:'AI Assistant',text:`shifted all dates ${dir>0?'forward':'backward'} by <strong>${shiftMatch[2]} ${shiftMatch[3]}s</strong>`,ts:Date.now(),field:'dates'});
        result={ok:true,msg:`✅ Shifted ${count} dates ${dir>0?'forward':'backward'} by ${shiftMatch[2]} ${shiftMatch[3]}(s)`,count};
      }
    }

    // === START FROM DATE ===
    if(!result){
      const startFrom=c.match(/(?:start|begin|rebase).*(?:from|on)\s*(?:today|now|(\d{4}-\d{2}-\d{2}|\d{1,2}\/\d{1,2}\/\d{2,4}|\w+\s+\d{1,2},?\s*\d{4}))/i);
      if(startFrom){
        const targetDate=startFrom[1]?safeDate(startFrom[1]):new Date();
        if(targetDate){
          const allStarts=proj.milestones.map(m=>safeDate(m.startDate)||safeDate(m.dueDate)).filter(d=>d);
          if(allStarts.length){
            const earliest=new Date(Math.min(...allStarts.map(d=>d.getTime())));
            const offsetMs=targetDate.getTime()-earliest.getTime();
            let count=0;
            proj.milestones.forEach(m=>{
              if(m.startDate){const d=safeDate(m.startDate);if(d){m.startDate=new Date(d.getTime()+offsetMs).toISOString().split('T')[0];count++;}}
              if(m.dueDate){const d=safeDate(m.dueDate);if(d){m.dueDate=new Date(d.getTime()+offsetMs).toISOString().split('T')[0];count++;}}
            });
            if(proj.targetDate){const d=safeDate(proj.targetDate);if(d){proj.targetDate=new Date(d.getTime()+offsetMs).toISOString().split('T')[0];}}
            proj.activity.push({id:uid(),author:'AI Assistant',text:`rebased plan to start from <strong>${fmtDate(targetDate.toISOString().split('T')[0])}</strong>`,ts:Date.now(),field:'dates'});
            result={ok:true,msg:`✅ Plan rebased — starts from ${fmtDate(targetDate.toISOString().split('T')[0])} (${count} dates updated)`,count};
          }
        }
      }
    }

    // === STATUS CHANGES ===
    if(!result){
      const statusMatch=c.match(/(?:mark|set|change|update)\s+(?:all\s+)?(?:the\s+)?(not started|in progress|at risk|blocked|complete|planning|design|development|testing|launch|unassigned|general)?\s*(?:milestones?|items?|tasks?)?\s*(?:as|to|→)\s*(not started|in progress|at risk|blocked|complete)/i);
      if(statusMatch){
        const filter=(statusMatch[1]||'').trim().toLowerCase();
        const newStatus=statusMatch[2].split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
        let targets=proj.milestones;
        let filterLabel='all';
        if(filter){
          const statusFilters={'not started':'Not Started','in progress':'In Progress','at risk':'At Risk','blocked':'Blocked','complete':'Complete'};
          if(statusFilters[filter]){targets=targets.filter(m=>m.status===statusFilters[filter]);filterLabel=statusFilters[filter];}
          else if(filter==='unassigned'){targets=targets.filter(m=>!m.owner);filterLabel='unassigned';}
          else{const phase=filter.charAt(0).toUpperCase()+filter.slice(1);targets=targets.filter(m=>(m.phase||'').toLowerCase()===filter);filterLabel=phase+' phase';}
        }
        let count=0;
        targets.forEach(m=>{const old=m.status;m.status=newStatus;if(newStatus==='Complete')m.progress=100;count++;
          proj.activity.push({id:uid(),author:'AI Assistant',text:`changed <strong>${m.title}</strong>: ${old} → <strong>${newStatus}</strong>`,ts:Date.now(),field:'status',milestoneId:m.id});
        });
        result={ok:true,msg:`✅ Changed ${count} ${filterLabel} milestone(s) to ${newStatus}`,count};
      }
    }

    // === REASSIGN ===
    if(!result){
      const reassignMatch=c.match(/(?:reassign|move|change|transfer)\s+(?:all\s+)?(?:milestones?\s+)?(?:from\s+)?(.+?)\s+(?:to|→)\s+(.+)/i);
      if(reassignMatch){
        const from=reassignMatch[1].trim(),to=reassignMatch[2].trim();
        let targets;
        if(from.toLowerCase()==='unassigned'||from.toLowerCase()==='blank'){targets=proj.milestones.filter(m=>!m.owner);}
        else{targets=proj.milestones.filter(m=>(m.owner||'').toLowerCase()===from.toLowerCase());}
        let count=0;
        targets.forEach(m=>{const old=m.owner;m.owner=to;count++;
          proj.activity.push({id:uid(),author:'AI Assistant',text:`reassigned <strong>${m.title}</strong> from ${old||'unassigned'} to <strong>${to}</strong>`,ts:Date.now(),field:'owner',milestoneId:m.id});
        });
        result={ok:true,msg:`✅ Reassigned ${count} milestone(s) from "${from}" to "${to}"`,count};
      }
    }

    // === ASSIGN UNASSIGNED ===
    if(!result){
      const assignMatch=c.match(/assign\s+(?:all\s+)?unassigned\s+(?:milestones?\s+)?(?:to\s+)?(.+)/i);
      if(assignMatch){
        const to=assignMatch[1].trim();
        if(to){
          const targets=proj.milestones.filter(m=>!m.owner);
          targets.forEach(m=>{m.owner=to;
            proj.activity.push({id:uid(),author:'AI Assistant',text:`assigned <strong>${m.title}</strong> to <strong>${to}</strong>`,ts:Date.now(),field:'owner',milestoneId:m.id});
          });
          result={ok:true,msg:`✅ Assigned ${targets.length} unassigned milestone(s) to ${to}`,count:targets.length};
        }
      }
    }

    // === ADD MILESTONES ===
    if(!result){
      const addMatch=c.match(/add\s+(\d+)?\s*(?:new\s+)?(planning|design|development|testing|launch|security|integration|documentation|training|general)?\s*milestone/i);
      if(addMatch){
        const count=parseInt(addMatch[1])||3;
        const phase=(addMatch[2]||'General');
        const phaseTitle=phase.charAt(0).toUpperCase()+phase.slice(1);
        const templates={
          'planning':['Stakeholder Alignment','Requirements Review','Resource Planning','Risk Assessment','Scope Definition'],
          'design':['User Research','Wireframe Review','Design System Update','Prototype Testing','Accessibility Audit'],
          'development':['Sprint Planning','Code Review Checkpoint','API Integration','Performance Optimization','Technical Debt Cleanup'],
          'testing':['Test Plan Creation','Unit Test Coverage','Integration Testing','Performance Testing','UAT Sign-off','Regression Testing','Load Testing'],
          'launch':['Launch Readiness Review','Go-Live Checklist','Post-Launch Monitoring','Stakeholder Communication','Rollback Plan Review'],
          'security':['Security Assessment','Penetration Testing','Compliance Review','Access Control Audit','Vulnerability Scan'],
          'integration':['API Mapping','Vendor Coordination','Integration Testing','Data Migration Validation'],
          'documentation':['Technical Docs','User Guide','API Documentation','Runbook Creation'],
          'training':['Training Plan','Training Materials','Team Training Sessions','Knowledge Transfer'],
          'general':['Checkpoint Review','Status Update','Stakeholder Demo','Retrospective','Planning Session']
        };
        const names=templates[phase.toLowerCase()]||templates.general;
        // Find latest date in project to sequence after
        const allDueDates=proj.milestones.map(m=>safeDate(m.dueDate)).filter(d=>d);
        let cursor=allDueDates.length?new Date(Math.max(...allDueDates.map(d=>d.getTime()))):new Date();
        const added=[];
        for(let i=0;i<count;i++){
          const title=names[i%names.length];
          const duration=Math.max(5,Math.round(7+Math.random()*14));
          const startDate=new Date(cursor.getTime()+86400000);
          const dueDate=new Date(startDate.getTime()+duration*86400000);
          const m={id:uid(),title,phase:phaseTitle,startDate:startDate.toISOString().split('T')[0],dueDate:dueDate.toISOString().split('T')[0],owner:'',description:`Auto-generated ${phaseTitle.toLowerCase()} milestone.`,status:'Not Started',priority:'medium',progress:0,comments:[]};
          proj.milestones.push(m);added.push(m);
          cursor=dueDate;
        }
        proj.activity.push({id:uid(),author:'AI Assistant',text:`added <strong>${count} ${phaseTitle}</strong> milestones: ${added.map(m=>m.title).join(', ')}`,ts:Date.now(),field:'milestone'});
        result={ok:true,msg:`✅ Added ${count} ${phaseTitle} milestones`,count};
      }
    }

    // === ADD SINGLE MILESTONE ===
    if(!result){
      const addSingle=c.match(/add\s+(?:a\s+)?(?:new\s+)?(?:milestone\s+)?(?:called|named|titled|for)?\s*["""]?(.+?)["""]?\s*(?:due|by|on|deadline)?\s*(?:next month|next week|(\d{4}-\d{2}-\d{2}|\d{1,2}\/\d{1,2}\/\d{2,4}|\w+\s+\d{1,2},?\s*\d{4}))?$/i);
      if(addSingle&&addSingle[1]&&addSingle[1].length>2){
        const title=addSingle[1].trim();
        let dueDate;
        if(addSingle[2])dueDate=safeDate(addSingle[2]);
        else if(c.includes('next month')){dueDate=new Date();dueDate.setMonth(dueDate.getMonth()+1);}
        else if(c.includes('next week')){dueDate=new Date();dueDate.setDate(dueDate.getDate()+7);}
        else{dueDate=new Date();dueDate.setDate(dueDate.getDate()+14);}
        const startDate=new Date(dueDate.getTime()-7*86400000);
        const m={id:uid(),title,phase:'General',startDate:startDate.toISOString().split('T')[0],dueDate:dueDate.toISOString().split('T')[0],owner:'',description:'',status:'Not Started',priority:'medium',progress:0,comments:[]};
        proj.milestones.push(m);
        proj.activity.push({id:uid(),author:'AI Assistant',text:`added milestone <strong>${title}</strong> due ${fmtDate(m.dueDate)}`,ts:Date.now(),field:'milestone'});
        result={ok:true,msg:`✅ Added milestone "${title}" due ${fmtDate(m.dueDate)}`,count:1};
      }
    }

    // === DELETE/REMOVE MILESTONES ===
    if(!result){
      const deleteMatch=c.match(/(?:delete|remove|drop)\s+(?:all\s+)?(not started|in progress|at risk|blocked|complete|planning|design|development|testing|launch|unassigned)?\s*(?:milestones?|items?|tasks?)/i);
      if(deleteMatch){
        const filter=(deleteMatch[1]||'').trim().toLowerCase();
        let targets;let filterLabel;
        const statusMap={'not started':'Not Started','in progress':'In Progress','at risk':'At Risk','blocked':'Blocked','complete':'Complete'};
        if(statusMap[filter]){targets=proj.milestones.filter(m=>m.status===statusMap[filter]);filterLabel=statusMap[filter];}
        else if(filter==='unassigned'){targets=proj.milestones.filter(m=>!m.owner);filterLabel='unassigned';}
        else if(filter){const ph=filter.charAt(0).toUpperCase()+filter.slice(1);targets=proj.milestones.filter(m=>(m.phase||'').toLowerCase()===filter);filterLabel=ph;}
        else{result={ok:false,msg:'⚠️ Please specify which milestones to delete (e.g., "delete all blocked milestones").'};targets=[];}
        if(targets&&targets.length&&!result){
          const ids=new Set(targets.map(m=>m.id));
          proj.milestones=proj.milestones.filter(m=>!ids.has(m.id));
          proj.activity.push({id:uid(),author:'AI Assistant',text:`removed <strong>${targets.length} ${filterLabel}</strong> milestones`,ts:Date.now(),field:'milestone'});
          result={ok:true,msg:`✅ Removed ${targets.length} ${filterLabel} milestone(s)`,count:targets.length};
        }
      }
    }

    // === SET PROGRESS ===
    if(!result){
      const progMatch=c.match(/set\s+(?:all\s+)?(in progress|planning|design|development|testing|launch)?\s*(?:milestones?\s+)?progress\s+(?:to\s+)?(\d+)/i);
      if(progMatch){
        const filter=(progMatch[1]||'').trim().toLowerCase();
        const progress=Math.min(100,Math.max(0,parseInt(progMatch[2])));
        let targets=proj.milestones;
        if(filter){
          const statusMap={'in progress':'In Progress'};
          if(statusMap[filter])targets=targets.filter(m=>m.status===statusMap[filter]);
          else targets=targets.filter(m=>(m.phase||'').toLowerCase()===filter);
        }
        targets.forEach(m=>{m.progress=progress;if(progress===100)m.status='Complete';});
        proj.activity.push({id:uid(),author:'AI Assistant',text:`set progress to <strong>${progress}%</strong> on ${targets.length} milestones`,ts:Date.now(),field:'progress'});
        result={ok:true,msg:`✅ Set progress to ${progress}% on ${targets.length} milestone(s)`,count:targets.length};
      }
    }

    // === FALLBACK ===
    if(!result){
      result={ok:false,msg:`🤔 I didn't understand that command. Try something like:
        <ul style="margin:8px 0;font-size:12px;color:var(--text-secondary);">
          <li>"Rebase all dates to 2026"</li>
          <li>"Shift all dates forward 2 weeks"</li>
          <li>"Start plan from today"</li>
          <li>"Mark all planning milestones as complete"</li>
          <li>"Assign all unassigned milestones to John"</li>
          <li>"Reassign from Alex to Sarah"</li>
          <li>"Add 3 testing milestones"</li>
          <li>"Add a milestone called Security Review due next month"</li>
          <li>"Delete all blocked milestones"</li>
          <li>"Set all in progress milestones progress to 50"</li>
          <li>"Change all Not Started milestones to In Progress"</li>
        </ul>`};
    }

    if(result.ok)save();
    resultEl.innerHTML=`<div class="card" style="padding:14px;${result.ok?'border-left:4px solid var(--success);':'border-left:4px solid var(--warning);'}">
      <div style="font-size:14px;${result.ok?'':'color:var(--warning);'}">${result.msg}</div>
      ${result.ok&&result.count?`<div style="margin-top:8px;"><button class="btn btn-secondary btn-sm" onclick="closeModal();render();">👀 View Changes</button></div>`:''}
    </div>`;
    if(result.ok){
      setTimeout(()=>{render();
        // Re-open the modal with fresh quick actions
        const proj2=getProject();if(proj2){
          const qa=document.getElementById('aiQuickActions');
          if(qa)qa.innerHTML=getQuickActions(proj2).map(a=>`<button class="btn btn-secondary btn-sm" style="font-size:11px;" onclick="document.getElementById('aiCommand').value='${a.cmd}';executeAICommand()">${a.icon} ${a.label}</button>`).join('');
        }
      },300);
    }
  }catch(err){
    console.error('AI command error:',err);
    resultEl.innerHTML=`<div class="card" style="padding:14px;border-left:4px solid var(--danger);"><div style="color:var(--danger);">❌ Error: ${err.message}</div></div>`;
  }
}

function parseTSV(text){const lines=text.split(/\r?\n/),result=[];for(let i=0;i<lines.length;i++){const line=lines[i];if(!line.trim())continue;const cells=[];let cur='',inQ=false;for(let j=0;j<line.length;j++){const ch=line[j];if(ch==='"'){if(inQ&&j+1<line.length&&line[j+1]==='"'){cur+='"';j++;}else inQ=!inQ;}else if(ch==='\t'&&!inQ){cells.push(cur.trim());cur='';}else cur+=ch;}cells.push(cur.trim());result.push(cells);}return result;}

function parseGoogleSheetsPaste(){
  const raw=(document.getElementById('gsheetsPasteArea')?.value||'').trim();
  if(!raw){toast('Paste data first','error');return;}
  let jsonData=raw.includes('\t')?parseTSV(raw):raw.split(/\r?\n/).filter(l=>l.trim()).map(line=>{const r=[];let c='',q=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"')q=!q;else if(ch===','&&!q){r.push(c.trim());c='';}else c+=ch;}r.push(c.trim());return r;});
  const filtered=jsonData.filter(row=>row.some(cell=>cell&&cell.toString().trim()));
  if(filtered.length<2){toast('Need at least header + 1 data row','error');return;}
  const headerRow=findHeaderRow(filtered),headers=filtered[headerRow].map(h=>(h||'').toString().trim());
  if(!headers.filter(h=>h).length){toast('No headers found','error');return;}
  const rawData=[];for(let i=headerRow+1;i<filtered.length;i++){const obj={};headers.forEach((h,idx)=>{if(h)obj[h]=filtered[i]?(filtered[i][idx]||''):'';});rawData.push(obj);}
  _pendingFileData={jsonData:filtered,rawData,headerRow,headers,fileName:'Google Sheets Import'};_gsheetsImportMode=true;
  const mapping=detectColumns(headers),confident=isAutoDetectionConfident(mapping,headers);
  if(confident){const ms=buildMilestonesFromMapping(filtered,rawData,headerRow,mapping);if(!ms.length){showGSheetsManualMapping(headers,filtered,headerRow,mapping);return;}_pendingFileMilestones=ms;_pendingFileMapping=mapping;showGSheetsPreview(ms,mapping,headers);}
  else showGSheetsManualMapping(headers,filtered,headerRow,mapping);
}

  const jsonData=lines.map(line=>{const r=[];let c='',q=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"')q=!q;else if(ch===','&&!q){r.push(c.trim());c='';}else c+=ch;}r.push(c.trim());return r;});

function normalizeHeader(h){if(!h)return'';return h.toString().toLowerCase().trim().replace(/[\s_\-]+/g,' ').replace(/[^a-z0-9 %]/g,'');}
const FIELD_KEYWORDS={title:['title','name','milestone','task','item','deliverable','activity','epic','story','feature','requirement','action','todo','objective','goal','initiative','subject','topic','label','ticket'],phase:['phase','category','group','stream','track','section','area','bucket','stage','module','sprint','iteration','release'],status:['status','state','progress status','current status','workflow'],owner:['owner','assignee','assigned to','assigned','responsible','resource','who','lead','person','team','member','contact','pm','dri'],startDate:['start','begin','kick','from','planned start','start date','begin date','kickoff','open date','created'],dueDate:['end','due','deadline','target','finish','complete by','eta','end date','due date','target date','finish date','delivery','completion','close date'],description:['desc','note','detail','comment','summary','info','remarks','scope','body','content','overview'],progress:['progress','percent','complete','%','pct','percent complete','completion','done'],priority:['priority','importance','urgency','severity','level','rank','criticality','impact']};
function scoreHeaderMatch(nh,field){if(!nh)return 0;const kws=FIELD_KEYWORDS[field];if(!kws)return 0;for(const k of kws)if(nh===k)return 100;for(const k of kws)if(nh.includes(k))return 80;for(const k of kws)if(k.includes(nh)&&nh.length>=3)return 60;for(const k of kws)for(const w of k.split(' '))if(w.length>=3&&nh.includes(w))return 40;return 0;}
function detectColumns(headers){const mapping={},used=new Set(),nh=headers.map(h=>normalizeHeader(h)),fields=Object.keys(FIELD_KEYWORDS),sm=[];for(let i=0;i<headers.length;i++)for(const f of fields){const s=scoreHeaderMatch(nh[i],f);if(s>0)sm.push({field:f,index:i,score:s});}sm.sort((a,b)=>b.score-a.score);for(const e of sm){if(mapping[e.field]!==undefined||used.has(e.index))continue;mapping[e.field]=e.index;used.add(e.index);}if(mapping.title===undefined)for(let i=0;i<headers.length;i++)if(!used.has(i)&&headers[i]&&headers[i].toString().trim()){mapping.title=i;break;}return mapping;}
function findHeaderRow(jsonData){const mc=Math.min(5,jsonData.length);let br=0,bs=-1;for(let r=0;r<mc;r++){const row=jsonData[r];if(!row||!row.length)continue;let s=0,ne=0;for(let c=0;c<row.length;c++){const v=(row[c]||'').toString().trim();if(!v)continue;ne++;const n=normalizeHeader(v);for(const f of Object.keys(FIELD_KEYWORDS))if(scoreHeaderMatch(n,f)>=30){s+=10;break;}if(v.length<40&&!/^\d{4}[-\/]/.test(v)&&!/^\d+(\.\d+)?$/.test(v))s+=1;}if(ne<2)continue;s+=ne;if(s>bs){bs=s;br=r;}}return br;}
function isAutoDetectionConfident(mapping,headers){if(mapping.title===undefined)return false;if(Object.keys(mapping).length>=2)return true;const th=normalizeHeader(headers[mapping.title]);return scoreHeaderMatch(th,'title')>=60;}
function parseExcelDate(v){if(!v&&v!==0)return'';if(v instanceof Date)return isNaN(v.getTime())?'':v.toISOString().split('T')[0];if(typeof v==='number'){if(v>1&&v<200000){const d=new Date(new Date(1899,11,30).getTime()+v*86400000);if(!isNaN(d.getTime()))return d.toISOString().split('T')[0];}return'';}const s=v.toString().trim();if(!s)return'';const iso=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);if(iso){const d=new Date(+iso[1],+iso[2]-1,+iso[3]);if(!isNaN(d.getTime()))return d.toISOString().split('T')[0];}const us=s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{4})/);if(us){const d=new Date(+us[3],+us[1]-1,+us[2]);if(!isNaN(d.getTime()))return d.toISOString().split('T')[0];}const d=new Date(s);return!isNaN(d.getTime())?d.toISOString().split('T')[0]:'';}
function parseExcelStatus(v){if(!v)return'Not Started';const s=v.toString().toLowerCase();if(/complete|done|finished|closed/i.test(s))return'Complete';if(/in\s*progress|active|ongoing|wip|working/i.test(s))return'In Progress';if(/at\s*risk|risk|warning/i.test(s))return'At Risk';if(/block|stuck|hold|paused|waiting/i.test(s))return'Blocked';return'Not Started';}
function parseExcelPhase(v){if(!v)return'General';const s=v.toString().toLowerCase();if(/plan|require|scope|discover/i.test(s))return'Planning';if(/design|ux|ui|wireframe/i.test(s))return'Design';if(/dev|build|implement|code|engineer/i.test(s))return'Development';if(/test|qa|quality|verify/i.test(s))return'Testing';if(/launch|deploy|release|ship|rollout/i.test(s))return'Launch';for(const p of PHASES)if(s===p.toLowerCase())return p;return'General';}
function parseExcelProgress(v){if(!v&&v!==0)return 0;if(typeof v==='number'){if(v>=0&&v<=1)return Math.round(v*100);if(v>=0&&v<=100)return Math.round(v);return 0;}const n=parseFloat(v.toString().replace('%',''));if(isNaN(n))return 0;if(n>=0&&n<=1)return Math.round(n*100);if(n>=0&&n<=100)return Math.round(n);return 0;}
function parseExcelPriority(v){if(!v)return'medium';const s=v.toString().toLowerCase();if(/high|critical|urgent/i.test(s))return'high';if(/low|minor/i.test(s))return'low';return'medium';}

function buildMilestonesFromMapping(jsonData,rawData,headerRow,mapping){
  const headers=jsonData[headerRow].map(h=>(h||'').toString().trim()),milestones=[];
  for(let i=0;i<jsonData.length-headerRow-1;i++){
    const row=jsonData[headerRow+1+i];if(!row||!row.some(c=>c&&c.toString().trim()))continue;
    if(mapping.title===undefined||mapping.title<0)continue;
    const title=(row[mapping.title]||'').toString().trim();if(!title)continue;
    const rr=rawData[i]||{};
    let sv=mapping.startDate>=0?row[mapping.startDate]:'',dv=mapping.dueDate>=0?row[mapping.dueDate]:'';
    if(mapping.startDate>=0&&rr[headers[mapping.startDate]]!==undefined){const rv=rr[headers[mapping.startDate]];if(typeof rv==='number')sv=rv;}
    if(mapping.dueDate>=0&&rr[headers[mapping.dueDate]]!==undefined){const rv=rr[headers[mapping.dueDate]];if(typeof rv==='number')dv=rv;}
    const m={id:uid(),title,phase:mapping.phase>=0?parseExcelPhase(row[mapping.phase]):'General',status:mapping.status>=0?parseExcelStatus(row[mapping.status]):'Not Started',owner:mapping.owner>=0?(row[mapping.owner]||'').toString().trim():'',startDate:parseExcelDate(sv),dueDate:parseExcelDate(dv),description:mapping.description>=0?(row[mapping.description]||'').toString().trim():'',progress:mapping.progress>=0?parseExcelProgress(row[mapping.progress]):0,priority:mapping.priority>=0?parseExcelPriority(row[mapping.priority]):'medium',comments:[]};
    if(m.status==='Complete'&&m.progress===0)m.progress=100;milestones.push(m);
  }
  return milestones;
}

function parseSpreadsheetData(jsonData,rawData,fileName){
  while(jsonData.length&&(!jsonData[0]||!jsonData[0].length||jsonData[0].every(c=>!c||!c.toString().trim())))jsonData.shift();
  if(jsonData.length<1){toast('Empty file','error');return;}
  const headerRow=findHeaderRow(jsonData),headers=jsonData[headerRow].map(h=>(h||'').toString().trim());
  if(!headers.filter(h=>h).length){toast('No headers','error');return;}
  const adj=[];for(let i=headerRow+1;i<jsonData.length;i++){const obj={};headers.forEach((h,idx)=>{if(h)obj[h]=jsonData[i]?(jsonData[i][idx]||''):'';});adj.push(obj);}
  const mapping=detectColumns(headers),confident=isAutoDetectionConfident(mapping,headers);
  _pendingFileData={jsonData,rawData:adj,headerRow,headers,fileName};
  if(confident){const ms=buildMilestonesFromMapping(jsonData,adj,headerRow,mapping);if(!ms.length){showManualMappingUI(headers,jsonData,headerRow,mapping);return;}_pendingFileMilestones=ms;_pendingFileMapping=mapping;showAutoDetectedPreview(ms,mapping,headers);}
  else showManualMappingUI(headers,jsonData,headerRow,mapping);
}

function analyzeProjectPrompt(prompt){
  const p=prompt.toLowerCase();
  // Extract name
  let name='';
  const namePatterns=[/(?:project|initiative)\s*(?:name|called|titled)?\s*[:=]?\s*"?([^".,\n]+)/i,/(?:launch|build|create|develop|implement|migrate|redesign|upgrade)\s+(?:a\s+)?(?:new\s+)?(.+?)(?:\.|,|\s+(?:with|using|for|by|in|over|within|timeline|deadline))/i];
  for(const r of namePatterns){const m=prompt.match(r);if(m){name=m[1].trim().slice(0,60);break;}}
  if(!name)name=prompt.split(/[.,!?\n]/)[0].trim().slice(0,60);

  // Extract timeline
  let totalDays=90;
  const monthMatch=p.match(/(\d+)\s*month/);if(monthMatch)totalDays=parseInt(monthMatch[1])*30;
  const weekMatch=p.match(/(\d+)\s*week/);if(weekMatch)totalDays=parseInt(weekMatch[1])*7;
  const dayMatch=p.match(/(\d+)\s*day/);if(dayMatch)totalDays=parseInt(dayMatch[1]);
  const qMatch=p.match(/(\d+)\s*quarter/);if(qMatch)totalDays=parseInt(qMatch[1])*90;
  const yearMatch=p.match(/(\d+)\s*year/);if(yearMatch)totalDays=parseInt(yearMatch[1])*365;
  // Deadline detection
  const byMatch=prompt.match(/(?:by|before|deadline)\s+(\w+\s+\d{1,2},?\s+\d{4}|\d{4}-\d{2}-\d{2}|\d{1,2}\/\d{1,2}\/\d{2,4})/i);
  if(byMatch){const dd=safeDate(byMatch[1]);if(dd){totalDays=Math.max(14,Math.ceil((dd.getTime()-Date.now())/(86400000)));}}

  // Detect project type & areas
  const projectTypes={
    software:{kw:['software','app','application','platform','system','tool','saas','website','portal'],phases:['Planning','Design','Development','Testing','Launch']},
    migration:{kw:['migrat','transition','move to','switch to','convert','upgrade'],phases:['Planning','Design','Development','Testing','Launch']},
    marketing:{kw:['campaign','marketing','brand','rebrand','content','social media','advertising'],phases:['Planning','Design','Development','Launch']},
    infrastructure:{kw:['infrastructure','cloud','server','devops','ci/cd','deploy','kubernetes','aws','azure','gcp'],phases:['Planning','Development','Testing','Launch']},
    product:{kw:['product','feature','mvp','prototype','roadmap'],phases:['Planning','Design','Development','Testing','Launch']},
    process:{kw:['process','workflow','automat','compliance','policy','procedure','governance'],phases:['Planning','Design','Development','Launch']},
    event:{kw:['event','conference','summit','workshop','training','onboarding'],phases:['Planning','Design','Launch']},
    data:{kw:['data','analytics','dashboard','report','etl','pipeline','warehouse','bi'],phases:['Planning','Design','Development','Testing','Launch']}
  };
  let projectType='software',matchedType=null;
  for(const[type,cfg]of Object.entries(projectTypes)){
    if(cfg.kw.some(k=>p.includes(k))){projectType=type;matchedType=cfg;break;}
  }
  const phases=matchedType?matchedType.phases:['Planning','Design','Development','Testing','Launch'];

  // Detect specific areas
  const areas=new Set();
  const areaKw={
    'api':['api','endpoint','rest','graphql','backend'],'frontend':['frontend','ui','react','angular','vue','mobile app'],
    'database':['database','db','sql','postgres','mongo','redis'],'auth':['auth','login','sso','oauth','security'],
    'integration':['integrat','third.party','vendor','partner','api connect'],'testing':['test','qa','quality'],
    'design':['design','ux','ui','wireframe','prototype','figma'],'docs':['document','docs','training','guide'],
    'infra':['infra','cloud','deploy','ci/cd','docker','kubernetes'],'analytics':['analytics','tracking','metrics','dashboard'],
    'compliance':['compliance','gdpr','hipaa','pci','audit','regulation'],'marketing':['marketing','campaign','launch','comms']
  };
  for(const[area,kws]of Object.entries(areaKw)){if(kws.some(k=>p.includes(k)))areas.add(area);}
  if(areas.size<2){if(projectType==='software')['api','frontend','testing','design'].forEach(a=>areas.add(a));
  else if(projectType==='marketing')['design','marketing','analytics'].forEach(a=>areas.add(a));
  else['design','testing'].forEach(a=>areas.add(a));}

  // Complexity
  const complexity=totalDays>180||areas.size>5?'high':totalDays>60||areas.size>3?'medium':'low';

  // Team size
  const teamMatch=prompt.match(/(\d+)\s*(?:people|team|engineer|developer|member|person)/i);
  const teamSize=teamMatch?parseInt(teamMatch[1]):complexity==='high'?6:complexity==='medium'?4:3;

  // Risks
  const risks=[];
  if(totalDays<30&&areas.size>3)risks.push('Tight timeline for scope');
  if(p.includes('migrat'))risks.push('Data migration complexity');
  if(areas.has('compliance'))risks.push('Regulatory approval delays');
  if(areas.has('integration'))risks.push('Third-party dependencies');
  if(totalDays>180)risks.push('Scope creep over long timeline');
  if(p.includes('legacy'))risks.push('Legacy system compatibility');

  // Recommendations
  const recommendations=[];
  if(totalDays<30)recommendations.push('Consider extending timeline — aggressive schedules increase risk of quality issues.');
  if(!areas.has('testing')&&projectType==='software')recommendations.push('Add dedicated testing phase — skipping QA is the #1 cause of launch issues.');
  if(areas.size>5)recommendations.push('Large scope detected — consider phased delivery with MVP first.');
  if(complexity==='high'&&teamSize<4)recommendations.push('High complexity with small team — consider adding resources or reducing scope.');
  if(totalDays>120)recommendations.push('Add monthly checkpoint milestones to catch drift early.');
  if(areas.has('integration'))recommendations.push('Start third-party integration early — vendor timelines are often unpredictable.');

  const startDate=new Date();startDate.setHours(0,0,0,0);
  const endDate=new Date(startDate.getTime()+totalDays*86400000);

  return{name,description:prompt.slice(0,200),totalDays,startDate,endDate,projectType,phases,areas:[...areas],complexity,teamSize,risks,recommendations};
}

function buildSmartMilestones(a){
  const ms=[];
  const td=a.totalDays;
  const start=a.startDate;
  function d(offset){const dt=new Date(start.getTime()+offset*86400000);return dt.toISOString().split('T')[0];}
  function dur(type){
    // Smart duration estimates based on milestone type and total timeline
    const base={
      'kickoff':Math.max(3,Math.round(td*0.03)),'requirements':Math.max(5,Math.round(td*0.07)),'architecture':Math.max(5,Math.round(td*0.06)),
      'research':Math.max(5,Math.round(td*0.08)),'wireframes':Math.max(5,Math.round(td*0.06)),'visual_design':Math.max(7,Math.round(td*0.08)),
      'prototype':Math.max(5,Math.round(td*0.06)),'dev_short':Math.max(7,Math.round(td*0.1)),'dev_medium':Math.max(10,Math.round(td*0.15)),
      'dev_long':Math.max(14,Math.round(td*0.2)),'integration':Math.max(7,Math.round(td*0.08)),'testing':Math.max(7,Math.round(td*0.1)),
      'beta':Math.max(5,Math.round(td*0.08)),'security':Math.max(5,Math.round(td*0.06)),'docs':Math.max(5,Math.round(td*0.05)),
      'campaign':Math.max(7,Math.round(td*0.1)),'rollout':Math.max(3,Math.round(td*0.05)),'review':Math.max(3,Math.round(td*0.04)),
      'checkpoint':1,'training':Math.max(3,Math.round(td*0.04))
    };
    return base[type]||Math.max(5,Math.round(td*0.07));
  }

  let cursor=0;

  // === PLANNING PHASE ===
  if(a.phases.includes('Planning')){
    const kickDur=dur('kickoff');
    ms.push({id:uid(),title:'Project Kickoff & Alignment',phase:'Planning',startDate:d(cursor),dueDate:d(cursor+kickDur),owner:'',description:'Define project scope, success criteria, stakeholders, and communication plan. Establish team roles and responsibilities.',status:'Not Started',priority:'high',progress:0,comments:[]});
    cursor+=Math.round(kickDur*0.5);

    const reqDur=dur('requirements');
    ms.push({id:uid(),title:'Requirements Gathering & Analysis',phase:'Planning',startDate:d(cursor),dueDate:d(cursor+reqDur),owner:'',description:'Document functional and non-functional requirements. Identify constraints, dependencies, and acceptance criteria.',status:'Not Started',priority:'high',progress:0,comments:[]});
    cursor+=Math.round(reqDur*0.7);

    if(a.projectType==='software'||a.projectType==='infrastructure'||a.projectType==='data'){
      const archDur=dur('architecture');
      ms.push({id:uid(),title:'Technical Architecture & Design',phase:'Planning',startDate:d(cursor),dueDate:d(cursor+archDur),owner:'',description:'Define system architecture, technology stack, data models, and integration points. Document technical decisions.',status:'Not Started',priority:'high',progress:0,comments:[]});
      cursor+=Math.round(archDur*0.8);
    }

    const revDur=dur('review');
    ms.push({id:uid(),title:'Planning Review & Sign-off',phase:'Planning',startDate:d(cursor),dueDate:d(cursor+revDur),owner:'',description:'Review all planning artifacts with stakeholders. Get formal sign-off before proceeding to execution.',status:'Not Started',priority:'high',progress:0,comments:[]});
    cursor+=revDur;
  }

  // === DESIGN PHASE ===
  if(a.phases.includes('Design')){
    if(a.areas.includes('design')||a.projectType==='product'||a.projectType==='software'){
      const resDur=dur('research');
      ms.push({id:uid(),title:'UX Research & User Analysis',phase:'Design',startDate:d(cursor),dueDate:d(cursor+resDur),owner:'',description:'Conduct user research, competitive analysis, and define user personas and journeys.',status:'Not Started',priority:'medium',progress:0,comments:[]});
      cursor+=Math.round(resDur*0.6);

      const wireDur=dur('wireframes');
      ms.push({id:uid(),title:'Wireframes & Information Architecture',phase:'Design',startDate:d(cursor),dueDate:d(cursor+wireDur),owner:'',description:'Create low-fidelity wireframes, user flows, and information architecture. Validate with stakeholders.',status:'Not Started',priority:'medium',progress:0,comments:[]});
      cursor+=Math.round(wireDur*0.7);

      const visDur=dur('visual_design');
      ms.push({id:uid(),title:'Visual Design & Prototyping',phase:'Design',startDate:d(cursor),dueDate:d(cursor+visDur),owner:'',description:'Create high-fidelity designs, design system components, and interactive prototypes for user testing.',status:'Not Started',priority:'medium',progress:0,comments:[]});
      cursor+=Math.round(visDur*0.8);
    }

    const revDur=dur('review');
    ms.push({id:uid(),title:'Design Review & Approval',phase:'Design',startDate:d(cursor),dueDate:d(cursor+revDur),owner:'',description:'Final design review with stakeholders. Approve designs and hand off to development.',status:'Not Started',priority:'medium',progress:0,comments:[]});
    cursor+=revDur;
  }

  // === DEVELOPMENT PHASE ===
  if(a.phases.includes('Development')){
    if(a.areas.includes('infra')||a.projectType==='infrastructure'){
      const infraDur=dur('dev_medium');
      ms.push({id:uid(),title:'Infrastructure & Environment Setup',phase:'Development',startDate:d(cursor),dueDate:d(cursor+infraDur),owner:'',description:'Set up development, staging, and production environments. Configure CI/CD pipelines and monitoring.',status:'Not Started',priority:'high',progress:0,comments:[]});
      cursor+=Math.round(infraDur*0.5);
    }

    if(a.areas.includes('database')||a.areas.includes('api')){
      const dbDur=dur('dev_medium');
      ms.push({id:uid(),title:'Data Layer & API Development',phase:'Development',startDate:d(cursor),dueDate:d(cursor+dbDur),owner:'',description:'Implement database schemas, data models, and core API endpoints. Include data validation and error handling.',status:'Not Started',priority:'high',progress:0,comments:[]});
      cursor+=Math.round(dbDur*0.6);
    }

    if(a.areas.includes('frontend')){
      const feDur=dur('dev_long');
      ms.push({id:uid(),title:'Frontend / UI Development',phase:'Development',startDate:d(cursor-Math.round(feDur*0.3)),dueDate:d(cursor+Math.round(feDur*0.7)),owner:'',description:'Build user interface components, implement designs, and connect to backend APIs.',status:'Not Started',priority:'high',progress:0,comments:[]});
    }

    if(a.areas.includes('auth')){
      const authDur=dur('dev_short');
      ms.push({id:uid(),title:'Authentication & Security Implementation',phase:'Development',startDate:d(cursor),dueDate:d(cursor+authDur),owner:'',description:'Implement authentication, authorization, and security controls. Include encryption and access management.',status:'Not Started',priority:'high',progress:0,comments:[]});
      cursor+=Math.round(authDur*0.8);
    }

    if(a.areas.includes('integration')){
      const intDur=dur('integration');
      ms.push({id:uid(),title:'Third-Party Integrations',phase:'Development',startDate:d(cursor),dueDate:d(cursor+intDur),owner:'',description:'Implement integrations with external services, APIs, and vendor systems. Include error handling and fallbacks.',status:'Not Started',priority:'high',progress:0,comments:[]});
      cursor+=Math.round(intDur*0.8);
    }

    if(a.areas.includes('analytics')){
      const anDur=dur('dev_short');
      ms.push({id:uid(),title:'Analytics & Reporting Setup',phase:'Development',startDate:d(cursor),dueDate:d(cursor+anDur),owner:'',description:'Implement tracking, dashboards, and reporting capabilities. Define KPIs and success metrics.',status:'Not Started',priority:'medium',progress:0,comments:[]});
      cursor+=Math.round(anDur*0.7);
    }

    // Dev complete checkpoint
    const devDone=dur('review');
    ms.push({id:uid(),title:'Development Complete — Code Freeze',phase:'Development',startDate:d(cursor),dueDate:d(cursor+devDone),owner:'',description:'All development work complete. Code freeze for testing phase. Final code review and merge.',status:'Not Started',priority:'high',progress:0,comments:[]});
    cursor+=devDone;
  }

  // === TESTING PHASE ===
  if(a.phases.includes('Testing')){
    const testDur=dur('testing');
    ms.push({id:uid(),title:'QA Testing & Bug Fixes',phase:'Testing',startDate:d(cursor),dueDate:d(cursor+testDur),owner:'',description:'Comprehensive testing: functional, regression, edge cases. Track and fix bugs. Verify acceptance criteria.',status:'Not Started',priority:'high',progress:0,comments:[]});
    cursor+=Math.round(testDur*0.7);

    if(a.areas.includes('compliance')){
      const compDur=dur('security');
      ms.push({id:uid(),title:'Compliance & Security Audit',phase:'Testing',startDate:d(cursor),dueDate:d(cursor+compDur),owner:'',description:'Security audit, penetration testing, and compliance verification. Address any findings.',status:'Not Started',priority:'high',progress:0,comments:[]});
      cursor+=Math.round(compDur*0.8);
    }

    if(td>45){
      const betaDur=dur('beta');
      ms.push({id:uid(),title:'Beta / UAT Testing',phase:'Testing',startDate:d(cursor),dueDate:d(cursor+betaDur),owner:'',description:'User acceptance testing with real users or stakeholders. Collect feedback and make final adjustments.',status:'Not Started',priority:'medium',progress:0,comments:[]});
      cursor+=betaDur;
    }

    const signDur=dur('review');
    ms.push({id:uid(),title:'Testing Sign-off & Go/No-Go',phase:'Testing',startDate:d(cursor),dueDate:d(cursor+signDur),owner:'',description:'Final testing review. Go/no-go decision for launch. Document known issues and workarounds.',status:'Not Started',priority:'high',progress:0,comments:[]});
    cursor+=signDur;
  }

  // === LAUNCH PHASE ===
  if(a.phases.includes('Launch')){
    if(a.areas.includes('docs')){
      const docDur=dur('docs');
      ms.push({id:uid(),title:'Documentation & Training Materials',phase:'Launch',startDate:d(cursor-docDur),dueDate:d(cursor),owner:'',description:'Create user guides, technical documentation, runbooks, and training materials.',status:'Not Started',priority:'medium',progress:0,comments:[]});
    }

    if(a.areas.includes('marketing')||a.projectType==='marketing'||a.projectType==='product'){
      const campDur=dur('campaign');
      ms.push({id:uid(),title:'Launch Communications & Campaign',phase:'Launch',startDate:d(cursor-Math.round(campDur*0.5)),dueDate:d(cursor+Math.round(campDur*0.5)),owner:'',description:'Prepare launch communications, marketing materials, and stakeholder notifications.',status:'Not Started',priority:'medium',progress:0,comments:[]});
    }

    if(a.areas.includes('training')||td>60){
      const trainDur=dur('training');
      ms.push({id:uid(),title:'Team Training & Enablement',phase:'Launch',startDate:d(cursor),dueDate:d(cursor+trainDur),owner:'',description:'Train support teams, end users, and stakeholders on the new system/process.',status:'Not Started',priority:'medium',progress:0,comments:[]});
      cursor+=trainDur;
    }

    const rollDur=dur('rollout');
    ms.push({id:uid(),title:'Production Rollout',phase:'Launch',startDate:d(cursor),dueDate:d(cursor+rollDur),owner:'',description:'Staged production deployment. Monitor for issues. Execute rollback plan if needed.',status:'Not Started',priority:'high',progress:0,comments:[]});
    cursor+=rollDur;

    const hyperDur=dur('review')+2;
    ms.push({id:uid(),title:'Post-Launch Monitoring & Hypercare',phase:'Launch',startDate:d(cursor),dueDate:d(cursor+hyperDur),owner:'',description:'Active monitoring period. Rapid response to issues. Collect early user feedback and metrics.',status:'Not Started',priority:'high',progress:0,comments:[]});
    cursor+=hyperDur;

    ms.push({id:uid(),title:'Project Retrospective & Close-out',phase:'Launch',startDate:d(cursor),dueDate:d(cursor+dur('review')),owner:'',description:'Lessons learned, final metrics review, knowledge transfer, and formal project closure.',status:'Not Started',priority:'medium',progress:0,comments:[]});
  }

  // Add monthly checkpoints for long projects
  if(td>90){
    const checkpoints=Math.floor(td/30)-1;
    for(let i=1;i<=Math.min(checkpoints,6);i++){
      const cpDay=i*30;
      ms.push({id:uid(),title:`Month ${i} Checkpoint`,phase:ms.find(m=>{const sd=safeDate(m.startDate);return sd&&Math.ceil((sd.getTime()-start.getTime())/86400000)<=cpDay;})?.phase||'Planning',startDate:d(cpDay),dueDate:d(cpDay+1),owner:'',description:`Monthly health check: review progress, risks, budget, and timeline. Adjust plan as needed.`,status:'Not Started',priority:'medium',progress:0,comments:[]});
    }
  }

  // Sort by start date
  ms.sort((a,b)=>{const sa=safeDate(a.startDate),sb=safeDate(b.startDate);return(sa?sa.getTime():0)-(sb?sb.getTime():0);});

  return ms;
}

function copyShareJson(){
  const el=document.getElementById('shareJson');
  if(el){
    const text=el.value.replace(/&lt;/g,'<').replace(/&quot;/g,'"');
    navigator.clipboard.writeText(text).then(()=>{
      const status=document.getElementById('jsonCopyStatus');
      if(status){status.style.display='inline';setTimeout(()=>status.style.display='none',3000);}
      toast('JSON copied!','success');
    }).catch(()=>{
      el.style.display='block';el.select();document.execCommand('copy');
      toast('JSON copied!','success');
    });
  }
}

function copyShareLink(){
  const input=document.getElementById('shareUrl');
  if(input){
    input.select();
    navigator.clipboard.writeText(input.value).then(()=>toast('Link copied!','success')).catch(()=>{document.execCommand('copy');toast('Link copied!','success');});
  }
}

function loadFromUrlHash(){
  try{
    const hash=window.location.hash;
    if(!hash||!hash.includes('project='))return false;
    const encoded=hash.split('project=')[1];
    if(!encoded)return false;

    // Always clear the hash immediately so it never reloads on refresh
    history.replaceState(null,'',window.location.pathname+window.location.search);

    const json=decodeURIComponent(escape(atob(encoded)));
    const proj=JSON.parse(json);
    if(!proj||!proj.name)return false;

    // Check if we already have this project loaded (user already visited this link before)
    // Use a stored flag so we don't re-add after deletion
    const hashKey='plt_loaded_'+btoa(proj.name).slice(0,20);
    if(localStorage.getItem(hashKey)){
      // Already loaded this shared link before — respect whatever user did (including deleting)
      return false;
    }

    // Mark that we've loaded this shared project
    localStorage.setItem(hashKey,'1');

    // Check for existing by name to avoid duplicates
    const existing=state.projects.find(p=>p.name===proj.name);
    if(existing){
      state.currentProjectId=existing.id;
      return true;
    }

    // Add as new project
    proj.id=uid();
    state.projects.push(proj);
    state.currentProjectId=proj.id;
    save();
    toast(`Loaded shared project: ${proj.name}`,'success');
    return true;
  }catch(err){
    console.error('Error loading from URL:',err);
    return false;
  }
}

  let hl='';if(rc.length)hl+=`<h3 style="color:var(--success)">✅ Completed</h3><ul class="slide-items">${rc.map(m=>`<li><span class="badge badge-green">Done</span> ${m.title}</li>`).join('')}</ul>`;if(bl.length)hl+=`<h3 style="color:var(--danger);margin-top:12px">🚨 Blockers</h3><ul class="slide-items">${bl.map(m=>`<li><span class="badge badge-${STATUS_BADGE[m.status]}">${m.status}</span> ${m.title}</li>`).join('')}</ul>`;
  slides.push(`<div class="slide"><h2>Highlights</h2><div style="margin-top:12px;">${hl||'<p>No highlights yet.</p>'}</div></div>`);
  const ns=ms.filter(m=>m.status!=='Complete').sort((a,b)=>new Date(a.dueDate||'2099-12-31')-new Date(b.dueDate||'2099-12-31')).slice(0,6);
  slides.push(`<div class="slide"><h2>Next Steps</h2><ul class="slide-items" style="margin-top:16px;">${ns.map(m=>`<li><div><strong>${m.title}</strong><br><span style="font-size:12px;color:var(--text-secondary);">${m.owner} · ${fmtDate(m.dueDate)}</span></div><span class="badge badge-${STATUS_BADGE[m.status]}">${m.status}</span></li>`).join('')}</ul>${!ns.length?'<p style="margin-top:16px;color:var(--success);font-weight:600;">🎉 All done!</p>':''}</div>`);
  window._slides=slides;window._currentSlide=0;
  return`<div style="display:flex;justify-content:flex-end;gap:8px;margin-bottom:16px;"><button class="btn btn-secondary" onclick="exportSlidesJSON()">📤 Export</button><button class="btn btn-primary" onclick="enterFullscreen()">🖥️ Present</button></div><div class="slides-container"><div id="slideContent">${slides[0]}</div><div class="slide-nav"><button onclick="prevSlide()">◀</button><span class="slide-counter" id="slideCounter">1 / ${slides.length}</span><button onclick="nextSlide()">▶</button></div></div>`;
}
function prevSlide(){if(window._currentSlide>0){window._currentSlide--;updateSlide();}}
function nextSlide(){if(window._currentSlide<window._slides.length-1){window._currentSlide++;updateSlide();}}
function updateSlide(){const e=document.getElementById('slideContent');if(e)e.innerHTML=window._slides[window._currentSlide];const c=document.getElementById('slideCounter');if(c)c.textContent=(window._currentSlide+1)+' / '+window._slides.length;const f=document.getElementById('fsSlideContent');if(f){f.innerHTML=window._slides[window._currentSlide];document.getElementById('fsSlideCounter').textContent=(window._currentSlide+1)+' / '+window._slides.length;}}
function enterFullscreen(){const d=document.createElement('div');d.className='fullscreen-slides';d.id='fullscreenSlides';d.innerHTML=`<button class="fs-close" onclick="exitFullscreen()">✕</button><div id="fsSlideContent">${window._slides[window._currentSlide]}</div><div class="slide-nav"><button onclick="prevSlide()">◀</button><span class="slide-counter" id="fsSlideCounter">${window._currentSlide+1} / ${window._slides.length}</span><button onclick="nextSlide()">▶</button></div>`;document.body.appendChild(d);}
function exitFullscreen(){const e=document.getElementById('fullscreenSlides');if(e)e.remove();}
function exportSlidesJSON(){const p=getProject();if(!p)return;const d={project:p.name,slides:window._slides.map((s,i)=>({index:i+1,html:s}))};const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='slides.json';a.click();URL.revokeObjectURL(u);toast('Exported');}

document.addEventListener('keydown',e=>{
  if(document.getElementById('confirmOverlay').classList.contains('open')){if(e.key==='Escape')closeConfirm();return;}
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  if(e.key==='n'){e.preventDefault();openNewMilestone();}
  if(e.key==='/'){e.preventDefault();switchView('milestones');setTimeout(()=>{const s=document.getElementById('msSearch');if(s)s.focus();},100);}
  if(e.key==='p'){e.preventDefault();if(document.getElementById('fullscreenSlides'))exitFullscreen();else{switchView('slides');setTimeout(()=>enterFullscreen(),200);}}
  if(e.key==='Escape'){closeModal();exitFullscreen();}
  if(e.key==='ArrowLeft'&&window._slides)prevSlide();
  if(e.key==='ArrowRight'&&window._slides)nextSlide();
});

load();render();
</script>
</body>
</html>
